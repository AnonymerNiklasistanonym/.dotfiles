# Enable hardware decoding if available (VAAPI, NVDEC, etc.)
hwdec=auto
# Synchronize video timing to the display clock and resample audio slightly
# This avoids frame drops/repeats when the display refresh rate does not
# exactly match the video frame rate (e.g. 23.976 fps video on 60 Hz display)
video-sync=display-resample
# Enable frame interpolation when needed to keep smooth motion
# mpv only uses it when frame timing requires it
interpolation=yes
# Temporal scaling algorithm used during interpolation
# "oversample" is lightweight and avoids artifacts
tscale=oversample
